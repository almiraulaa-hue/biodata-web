<!DOCTYPE html>
<html>
<head>
    <title>Website Ujian Pemrograman Web</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
<style>
body{
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container{
    width: 420px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    color: white;
}

h2, h3{
    text-align: center;
}

input, textarea{
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.2);
    color: white;
}

input::placeholder,
textarea::placeholder{
    color: rgba(255,255,255,0.8);
}

input:focus,
textarea:focus{
    background: rgba(255,255,255,0.3);
}

.btn{
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.3);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover{
    background: rgba(255,255,255,0.5);
}

.hasil{
    margin-top: 15px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.2);
}

.doc-buttons button{
    width: 100%;
    margin-bottom: 10px;
    padding: 8px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.25);
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.doc-buttons button:hover{
    background: rgba(255,255,255,0.5);
}

hr{
    border: 1px solid rgba(255,255,255,0.3);
}
</style>
        
</head>
<body>

<div class="navbar">
    Website Ujian Pemrograman Web - XI TKJ
</div>

<div class="container">

    <h2>Form Biodata</h2>

    <form id="formBiodata">
        <input type="text" id="nama" placeholder="Nama Lengkap" required>
        <input type="text" id="kelas" placeholder="Kelas" required>
        <textarea id="alamat" placeholder="Alamat" required></textarea>
        <input type="date" id="tgl" required>
        <button type="submit" class="btn">Simpan</button>
    </form>

    <div id="hasil" class="hasil" style="display:none;"></div>

    <hr>

    <h3>Dokumentasi Jawaban</h3>

    <div class="doc-buttons">
        <a href="soal1.html"><button class="s1">Jawaban Soal 1 (XAMPP)</button></a>
        <a href="soal2.html"><button class="s2">Jawaban Soal 2 (Laragon)</button></a>
        <a href="soal3.html"><button class="s3">Jawaban Soal 3 (GitHub Pages)</button></a>
    </div>

</div>

<script>
document.getElementById("formBiodata").addEventListener("submit", function(e){
    e.preventDefault();

    let nama = document.getElementById("nama").value;
    let kelas = document.getElementById("kelas").value;
    let alamat = document.getElementById("alamat").value;
    let tgl = new Date(document.getElementById("tgl").value);
    let today = new Date();

    let umur = today.getFullYear() - tgl.getFullYear();
    let bulan = today.getMonth() - tgl.getMonth();

    if (bulan < 0 || (bulan === 0 && today.getDate() < tgl.getDate())) {
        umur--;
    }

    let hasilBox = document.getElementById("hasil");
    hasilBox.style.display = "block";
    hasilBox.innerHTML =
        "<strong>Data Berhasil Disimpan</strong><br><br>" +
        "Nama: " + nama + "<br>" +
        "Kelas: " + kelas + "<br>" +
        "Alamat: " + alamat + "<br>" +
        "Umur: " + umur + " tahun";
});
</script>

</body>
</html>
