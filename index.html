<!DOCTYPE html>
<html>
<head>
    <title>Website Ujian Pemrograman Web</title>
    <style>
        body{
            font-family: Arial;
            background-color: #eef2f7;
            text-align: center;
        }
        .container{
            background: white;
            padding: 30px;
            width: 50%;
            margin: auto;
            margin-top: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input, textarea{
            width: 90%;
            padding: 8px;
            margin: 5px;
        }
        button{
            padding: 10px 15px;
            margin: 8px;
            border: none;
            background-color: #2d89ef;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover{
            opacity: 0.8;
        }
        .nav-btn{
            background-color: #28a745;
        }
        .nav-btn.s3{
            background-color: #6f42c1;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Form Biodata Ujian</h2>

    <form id="formBiodata">
        <input type="text" id="nama" placeholder="Nama Lengkap" required><br>
        <input type="text" id="kelas" placeholder="Kelas" required><br>
        <textarea id="alamat" placeholder="Alamat" required></textarea><br>
        <input type="date" id="tgl" required><br>
        <button type="submit">Simpan</button>
    </form>

    <h3 id="hasil"></h3>

    <hr>

    <h3>Dokumentasi Jawaban</h3>

    <a href="soal1.html">
        <button class="nav-btn">Jawaban Soal 1 (XAMPP)</button>
    </a>

    <a href="soal2.html">
        <button class="nav-btn">Jawaban Soal 2 (Laragon)</button>
    </a>

    <a href="soal3.html">
        <button class="nav-btn s3">Jawaban Soal 3 (GitHub Pages)</button>
    </a>

</div>

<script>
document.getElementById("formBiodata").addEventListener("submit", function(e){
    e.preventDefault();

    let nama = document.getElementById("nama").value;
    let kelas = document.getElementById("kelas").value;
    let alamat = document.getElementById("alamat").value;
    let tgl = new Date(document.getElementById("tgl").value);
    let today = new Date();

    let umur = today.getFullYear() - tgl.getFullYear();
    let bulan = today.getMonth() - tgl.getMonth();

    if (bulan < 0 || (bulan === 0 && today.getDate() < tgl.getDate())) {
        umur--;
    }

    document.getElementById("hasil").innerHTML =
        "Nama: " + nama + "<br>" +
        "Kelas: " + kelas + "<br>" +
        "Alamat: " + alamat + "<br>" +
        "Umur: " + umur + " tahun";
});
</script>

</body>

</html>
