<!DOCTYPE html>
<html>
<head>
    <title>Form Biodata</title>
</head>
<body>

<h2>Form Biodata</h2>

<form id="formBiodata">
    Nama Lengkap:<br>
    <input type="text" id="nama" required><br><br>

    Kelas:<br>
    <input type="text" id="kelas" required><br><br>

    Alamat:<br>
    <textarea id="alamat" required></textarea><br><br>

    Tanggal Lahir:<br>
    <input type="date" id="tgl_lahir" required><br><br>

    <button type="submit">Simpan</button>
</form>

<h3 id="hasil"></h3>

<script>
document.getElementById("formBiodata").addEventListener("submit", function(e){
    e.preventDefault();

    let nama = document.getElementById("nama").value;
    let kelas = document.getElementById("kelas").value;
    let alamat = document.getElementById("alamat").value;
    let tgl = new Date(document.getElementById("tgl_lahir").value);
    let today = new Date();

    let umur = today.getFullYear() - tgl.getFullYear();

    document.getElementById("hasil").innerHTML =
        "Nama: " + nama + "<br>" +
        "Kelas: " + kelas + "<br>" +
        "Alamat: " + alamat + "<br>" +
        "Umur: " + umur + " tahun";
});
</script>

</body>
</html>
